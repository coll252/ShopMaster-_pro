<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShopPro - E-Commerce</title>

  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: Arial; background:#f4f4f4; }

    header {
      display:flex; gap:10px; padding:15px;
      background:#ea580c; color:white; align-items:center;
    }

    header input {
      flex:1; padding:10px; border:none; border-radius:8px;
    }

    button {
      padding:10px; border:none; border-radius:8px;
      background:#0f172a; color:white; cursor:pointer;
    }

    main {
      display:grid;
      grid-template-columns: 250px 1fr;
      gap:20px;
      padding:20px;
    }

    .sidebar {
      background:white; padding:15px; border-radius:10px;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
      gap:15px;
    }

    .card {
      background:white;
      padding:10px;
      border-radius:10px;
    }

    .card img {
      width:100%; height:150px; object-fit:cover;
    }

    .price { color:#ea580c; font-weight:bold; }

    .modal {
      position:fixed; inset:0;
      background:rgba(0,0,0,0.6);
      display:none; align-items:center; justify-content:center;
    }

    .modal-box {
      background:white; padding:20px; border-radius:10px;
      width:90%; max-width:400px;
    }

    .show { display:flex; }

    #admin { display:none; padding:20px; }

    @media(max-width:800px){
      main { grid-template-columns:1fr; }
    }
  </style>
</head>

<body>

<header>
  <h2>ShopPro</h2>
  <input id="search" placeholder="Search products...">
  <button onclick="openCart()">Cart (<span id="cartCount">0</span>)</button>
  <button onclick="showAuth()">Login</button>
  <button onclick="adminLogin()">Admin</button>
</header>

<main>
  <div class="sidebar">
    <h3>Filters</h3>
    <select id="category"></select>
    <select id="sort">
      <option value="new">Newest</option>
      <option value="price_asc">Price ↑</option>
      <option value="price_desc">Price ↓</option>
      <option value="best">Best</option>
    </select>
    <button onclick="loadProducts()">Apply</button>
  </div>

  <div>
    <h2>Products</h2>
    <div id="products" class="grid"></div>
  </div>
</main>

<!-- CART -->
<div id="cartModal" class="modal">
  <div class="modal-box">
    <h3>Cart</h3>
    <div id="cartItems"></div>
    <button onclick="checkout()">Checkout</button>
    <button onclick="closeCart()">Close</button>
  </div>
</div>

<!-- AUTH -->
<div id="authModal" class="modal">
  <div class="modal-box">
    <h3>Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>

    <h3>Register</h3>
    <input id="name" placeholder="Name"><br><br>
    <input id="email2" placeholder="Email"><br><br>
    <input id="pass2" type="password" placeholder="Password"><br><br>
    <button onclick="register()">Register</button>

    <button onclick="hideAuth()">Close</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin">
  <h2>Admin Dashboard</h2>
  <div id="stats"></div>
  <div id="orders"></div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const API = "";
let token = localStorage.getItem("token") || "";
let adminToken = localStorage.getItem("adminToken") || "";
const socket = io();

async function api(url, method="GET", body=null, isAdmin=false){
  const headers = {"Content-Type":"application/json"};
  if(token && !isAdmin) headers["Authorization"] = "Bearer " + token;
  if(adminToken && isAdmin) headers["Authorization"] = "Bearer " + adminToken;

  const res = await fetch(API+url,{
    method,
    headers,
    body: body ? JSON.stringify(body):null
  });

  const data = await res.json();
  if(!res.ok) throw new Error(data.error || "Error");
  return data;
}

/* PRODUCTS */

async function loadProducts(){
  const q = search.value;
  const category = document.getElementById("category").value;
  const sort = document.getElementById("sort").value;

  const products = await api(`/api/products?q=${q}&category=${category}&sort=${sort}`);

  document.getElementById("products").innerHTML = products.map(p=>`
    <div class="card">
      <img src="${p.image}">
      <h4>${p.name}</h4>
      <p class="price">KES ${p.price}</p>
      <button onclick="addToCart(${p.id})">Add</button>
      <button onclick="wishlist(${p.id})">♥</button>
    </div>
  `).join("");
}

/* CART */

async function loadCart(){
  if(!token) return;
  const items = await api("/api/cart");

  cartCount.innerText = items.length;

  cartItems.innerHTML = items.map(i=>`
    <div>
      ${i.name} x ${i.quantity}
      <button onclick="removeCart(${i.id})">X</button>
    </div>
  `).join("");
}

async function addToCart(id){
  if(!token) return showAuth();
  await api("/api/cart","POST",{product_id:id});
  loadCart();
}

async function removeCart(id){
  await api("/api/cart/"+id,"DELETE");
  loadCart();
}

/* WISHLIST */

async function wishlist(id){
  if(!token) return showAuth();
  await api("/api/wishlist","POST",{product_id:id});
  alert("Saved");
}

/* CHECKOUT */

async function checkout(){
  const address_id = prompt("Enter address ID");
  const res = await api("/api/orders","POST",{address_id});
  alert("Order ID: "+res.orderId);
}

/* AUTH */

function showAuth(){ authModal.classList.add("show"); }
function hideAuth(){ authModal.classList.remove("show"); }

async function login(){
  const res = await api("/api/login","POST",{
    email:email.value,
    password:password.value
  });

  token = res.token;
  localStorage.setItem("token",token);
  hideAuth();
  loadCart();
}

async function register(){
  await api("/api/register","POST",{
    name:name.value,
    email:email2.value,
    password:pass2.value
  });

  alert("Registered");
}

/* ADMIN */

async function adminLogin(){
  const email = prompt("Admin email");
  const password = prompt("Password");

  const res = await fetch("/api/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  });

  const data = await res.json();
  if(!res.ok) return alert(data.error);

  adminToken = data.token;
  localStorage.setItem("adminToken",adminToken);

  document.getElementById("admin").style.display="block";
  loadAdmin();
}

async function loadAdmin(){
  const stats = await api("/api/admin/analytics","GET",null,true);

  document.getElementById("stats").innerHTML = `
    Revenue: ${stats.revenue.total}<br>
    Orders: ${stats.orders.total}<br>
    Customers: ${stats.customers.total}
  `;

  const orders = await api("/api/admin/orders","GET",null,true);

  document.getElementById("orders").innerHTML = orders.map(o=>`
    <div>
      #${o.id} ${o.customer_name} - ${o.total}
      <select onchange="updateOrder(${o.id},this.value)">
        ${["pending","paid","processing","shipped","delivered"].map(s=>
          `<option ${o.status==s?"selected":""}>${s}</option>`
        )}
      </select>
    </div>
  `).join("");
}

async function updateOrder(id,status){
  await api(`/api/admin/orders/${id}/status`,"PATCH",{status},true);
}

/* SOCKET */

socket.on("order_status",data=>{
  alert(`Order ${data.orderId} is now ${data.status}`);
});

/* INIT */

async function init(){
  const cats = await api("/api/categories");
  category.innerHTML = `<option value="">All</option>` +
    cats.map(c=>`<option value="${c.slug}">${c.name}</option>`).join("");

  loadProducts();
  loadCart();
}

init();
</script>

</body>
</html>
